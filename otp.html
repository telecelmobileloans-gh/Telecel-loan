<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --red: #E42320;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .logo-section {
            text-align: center;
            padding: 22px 0 10px;
        }
        .telecel-logo {
            width: 85px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 23px;
            font-weight: 700;
            color: #1e2937;
            margin: 8px 0 6px;
        }
        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 15.3px;
            padding: 0 25px 18px;
            line-height: 1.5;
        }
        .loan-info {
            background: #fff0f0;
            margin: 0 20px 18px;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #ffe0e0;
        }
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 18px 0 26px;
            padding: 0 20px;
        }
        .otp-input {
            width: 52px;
            height: 62px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .otp-input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(228, 35, 32, 0.15);
        }
        .form-section {
            padding: 0 25px 30px;
        }
        .error-msg {
            text-align: center;
            margin: 12px 20px 18px;
            font-size: 14.8px;
            padding: 14px;
            border-radius: 12px;
            display: none;
            color: #dc3545;
            background: #ffebee;
            border: 1px solid #ffc6c6;
        }
        .btn-action {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 17px;
            font-size: 17.5px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
        }
        .back-btn {
            width: 100%;
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 16px;
            font-size: 16.5px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
        }
        #spinner {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spin {
            width: 65px;
            height: 65px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid var(--red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <svg class="telecel-logo" width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M48.19 28.6833C40.4333 28.605 34.1983 34.9933 34.2183 42.58C34.2383 50.625 40.9883 56.56 48.0333 56.4317C55.5033 56.5017 61.8867 50.53 61.9517 42.7583C62.02 34.62 55.575 28.76 48.19 28.6833ZM53.7333 38.1633C53.6017 39.2783 52.9467 39.9367 51.93 40.29C51.3683 40.4867 50.7833 40.4917 50.195 40.4917C49.8333 40.49 49.4683 40.46 49.1067 40.5183C48.8467 40.5617 48.7033 40.6917 48.6667 40.97C48.6133 41.3467 48.6917 41.7133 48.6883 42.085C48.6867 43.6083 48.6883 45.135 48.6867 46.6583C48.6867 46.9117 48.7133 47.1617 48.7667 47.4067C48.9833 48.3783 49.7917 48.955 50.7817 48.8333C51.5417 48.7383 52.31 48.7333 53.0733 48.6683C53.3933 48.6417 53.495 48.7833 53.4717 49.1233C53.435 49.6333 53.4383 50.1433 53.47 50.655C53.535 51.715 53.0383 52.4717 52.1333 52.8467C49.6867 53.8583 47.2717 53.835 45.065 52.2417C43.8517 51.3667 43.2033 50.115 43.1333 48.57C43.0467 46.585 43.0117 44.6 42.9517 42.6117C42.8883 40.605 42.9083 38.5967 42.9233 36.59C42.9333 35.2433 43.5583 34.15 44.5517 33.265C45.1033 32.7717 45.7183 32.37 46.3867 32.05C46.9933 31.7583 47.6283 31.6483 48.295 31.6583C48.5333 31.6633 48.6233 31.7533 48.6467 31.9983C48.7117 32.6333 48.68 33.27 48.6933 33.8517C48.6933 34.3667 48.6883 34.8317 48.6933 35.295C48.695 35.6983 48.8383 35.845 49.2467 35.905C49.5283 35.9483 49.8083 35.9117 50.09 35.91C51.06 35.8983 52.0267 35.8983 52.9967 35.905C53.5683 35.9117 53.745 36.0867 53.7283 36.6517C53.7117 37.1567 53.7967 37.655 53.7383 38.1633H53.7333Z" fill="#E32526"/>
            </svg>
        </div>
       
        <h1>Loan OTP Verification</h1>
        <p class="subtitle">A 5-digit verification code has been sent to your Telecel number.<br>Enter it below to authorize your loan.</p>
  
        <!-- Loan Information -->
        <div class="loan-info" id="loanInfo">
            <strong id="loanTitle">Flex Loan</strong><br>
            <span id="loanAmount" style="color:#E42320; font-weight:700; font-size:24px;"></span>
            <p id="loanDetails" style="margin-top:8px; font-size:14.5px; color:#334155;"></p>
        </div>

        <div class="otp-container" id="otpInputs"></div>
        <div class="error-msg" id="errMsg"></div>
       
        <div class="form-section">
            <button class="btn-action" id="verifyBtn">Verify & Authorize Loan</button>
            <button class="back-btn" onclick="window.history.back()">← Back to Application</button>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner">
        <div class="spin"></div>
        <p style="margin-top:25px; font-size:17px;">Verifying OTP & Authorizing Loan...</p>
    </div>

    <script>
        // Get data from previous page
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Flex Loan';
        const amount = params.get('amount') || '10000';
        const repay = params.get('repay') || '11200';
        const duration = params.get('duration') || '30';

        // Fill loan info
        document.getElementById('loanTitle').textContent = name;
        document.getElementById('loanAmount').textContent = `GHS ${parseInt(amount).toLocaleString()}`;
        document.getElementById('loanDetails').textContent = `${duration} Days • Total Repay: GHS ${parseInt(repay).toLocaleString()}`;

        // Create OTP Inputs (5 digits)
        function createOTPInputs() {
            const container = document.getElementById('otpInputs');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.className = 'otp-input';
                input.inputMode = 'numeric';
                container.appendChild(input);
            }
        }

        function setupAutoFocus() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value.length === 1 && index < 4) {
                        inputs[index + 1].focus();
                    }
                    if (getOTPCode().length === 5) {
                        setTimeout(verifyOTP, 300);
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        }

        function getOTPCode() {
            return Array.from(document.querySelectorAll('.otp-input'))
                        .map(i => i.value.trim()).join('');
        }

        function verifyOTP() {
            const otp = getOTPCode();
            if (otp.length !== 5) return;

            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.textContent = "Verifying...";
            verifyBtn.disabled = true;

            document.getElementById('spinner').style.display = 'flex';

            // Simulate verification
            setTimeout(() => {
                window.location.href = `success.html?name=${encodeURIComponent(name)}&amount=${amount}&repay=${repay}&duration=${duration}`;
            }, 1800);
        }

        // Initialize
        createOTPInputs();
        setupAutoFocus();
        document.getElementById('verifyBtn').onclick = verifyOTP;
    </script>
</body>
</html>
